version: "3.9"

# Starts all infrastructure services needed by CoverageAtlas:
#   PostgreSQL  → relational DB  (localhost:5432)
#   Qdrant      → vector DB      (localhost:6333)
#   Redis       → Celery broker  (localhost:6379)
#
# Usage:
#   docker compose up -d          # start all
#   docker compose down           # stop all
#   docker compose logs -f qdrant # tail one service

services:

  postgres:
    image: postgres:16-alpine
    container_name: coverageatlas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       coverageatlas
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: coverageatlas_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC (optional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  redis:
    image: redis:7-alpine
    container_name: coverageatlas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
